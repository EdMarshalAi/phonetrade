name: Process email queue

# Обработка очереди отложенных писем (welcome 2/5д, отзыв, cross-sell).
# Транзакционные письма (заказ/статус/welcome_1) шлются синхронно, не тут.
# Секрет читаем из shop_settings.cron_secret через service-role — без новых
# GitHub-секретов. GitHub cron: минимум 5 мин, бывают задержки — для писем
# с дневными отсрочками этого достаточно.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: email-queue
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger email queue processor
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SERVICE_KEY:-}" ]; then
            echo "::error::Не заданы секреты NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY"; exit 1
          fi
          # 1) Берём cron_secret из shop_settings (service-role). Отделяем тело от HTTP-кода,
          #    чтобы при ошибке (напр. 401 — неверный service-key) вывести понятную диагностику,
          #    а не криптическую "jq: Cannot index object with number".
          RESP=$(curl -s -w $'\n%{http_code}' "$SUPABASE_URL/rest/v1/shop_settings?key=eq.cron_secret&select=value" \
            -H "apikey: $SERVICE_KEY" -H "Authorization: Bearer $SERVICE_KEY")
          HTTP=$(printf '%s' "$RESP" | tail -n1)
          BODY=$(printf '%s' "$RESP" | sed '$d')
          if [ "$HTTP" != "200" ]; then
            echo "::error::Запрос cron_secret вернул HTTP $HTTP (проверьте секрет SUPABASE_SERVICE_ROLE_KEY)"; echo "$BODY"; exit 1
          fi
          SECRET=$(printf '%s' "$BODY" | jq -r 'if type=="array" then (.[0].value // empty) else empty end')
          if [ -z "$SECRET" ]; then echo "::error::cron_secret не найден в shop_settings"; echo "$BODY"; exit 1; fi
          # 2) Дёргаем процессор очереди писем
          CODE=$(curl -fsS "https://phonetrade31.ru/api/cron/process-email-queue" \
            -H "x-cron-secret: $SECRET" -w "%{http_code}" -o /tmp/resp.json || true)
          echo "HTTP $CODE"; cat /tmp/resp.json || true
