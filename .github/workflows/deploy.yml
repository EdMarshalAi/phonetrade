name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Не запускать два деплоя одновременно; новый пуш отменяет предыдущий
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # --- Supabase (раскомментировать, когда подключим клиент) ---
          # NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          # NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          cp ecosystem.config.js .next/standalone/ecosystem.config.js

      - name: Check deploy secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] \
             || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "::warning::Деплой пропущен — не заданы секреты SSH_HOST / SSH_USER / SSH_PRIVATE_KEY / DEPLOY_PATH. Сборка прошла успешно."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH
        if: env.SKIP_DEPLOY != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync standalone to server
        if: env.SKIP_DEPLOY != 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.SSH_PORT || '22' }}" \
            .next/standalone/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Restart with PM2
        if: env.SKIP_DEPLOY != 'true'
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && (pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js) && pm2 save"
