name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

# Несекретные параметры сервера — здесь, чтобы в GitHub нужен был только
# приватный ключ (SSH_PRIVATE_KEY) и две публичные переменные Supabase.
env:
  SSH_HOST: "31.129.97.8"
  SSH_USER: "root"
  SSH_PORT: "22"
  DEPLOY_PATH: "/opt/phonetrade"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          cp ecosystem.config.js .next/standalone/ecosystem.config.js

      - name: Check deploy key
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::warning::Деплой пропущен — нет секрета SSH_PRIVATE_KEY. Сборка прошла успешно."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH
        if: env.SKIP_DEPLOY != 'true'
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # printf '%s\n' гарантирует завершающий перевод строки —
          # без него OpenSSH ругается "invalid format" на ключе из секрета.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Проверяем, что ключ читается (явная ошибка вместо падения rsync)
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null
          # Доверяем host key при первом подключении (без интерактива)
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $SSH_HOST
            User $SSH_USER
            Port $SSH_PORT
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking accept-new
            IdentitiesOnly yes
            BatchMode yes
          EOF

      - name: Rsync standalone to server
        if: env.SKIP_DEPLOY != 'true'
        run: |
          ssh deploy-target \
            "mkdir -p '$DEPLOY_PATH'; command -v rsync >/dev/null 2>&1 || (apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y rsync)"
          rsync -az --delete -e "ssh" \
            .next/standalone/ \
            "deploy-target:$DEPLOY_PATH/"

      - name: Restart with PM2
        if: env.SKIP_DEPLOY != 'true'
        env:
          SVC: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ssh deploy-target \
            "cd '$DEPLOY_PATH' && SUPABASE_SERVICE_ROLE_KEY='$SVC' bash -c '(pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js) && pm2 save'"
