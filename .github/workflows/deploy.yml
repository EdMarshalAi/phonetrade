name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

# Несекретные параметры сервера — здесь, чтобы в GitHub нужен был только
# приватный ключ (SSH_PRIVATE_KEY) и две публичные переменные Supabase.
env:
  SSH_HOST: "31.129.97.8"
  SSH_USER: "root"
  SSH_PORT: "22"
  DEPLOY_PATH: "/opt/phonetrade"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          cp ecosystem.config.js .next/standalone/ecosystem.config.js

      - name: Check deploy key
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::warning::Деплой пропущен — нет секрета SSH_PRIVATE_KEY. Сборка прошла успешно."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH
        if: env.SKIP_DEPLOY != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync standalone to server
        if: env.SKIP_DEPLOY != 'true'
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
            .next/standalone/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Restart with PM2
        if: env.SKIP_DEPLOY != 'true'
        env:
          SVC: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && SUPABASE_SERVICE_ROLE_KEY='$SVC' (pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js) && pm2 save"
