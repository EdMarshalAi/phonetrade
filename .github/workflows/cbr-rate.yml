name: CBR rate hourly

# Ежечасно дёргает защищённый роут, который обновляет курс ЦБ и (если включён
# авто-режим в прайсе) пересчитывает цены. Требует секрет CRON_SECRET.
on:
  schedule:
    - cron: "7 * * * *" # каждый час в :07
  workflow_dispatch: {}

jobs:
  fetch-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Hit CBR rate endpoint
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "CRON_SECRET не задан — пропускаю (добавьте секрет, чтобы включить авто-обновление курса)."
            exit 0
          fi
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 60 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "http://31.129.97.8/api/cron/cbr-rate")
          echo "HTTP $code"; cat /tmp/out.json || true
          [ "$code" = "200" ] || { echo "Не 200 — провал"; exit 1; }
